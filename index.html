    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg-1); }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        color: var(--text);
        min-height: 100vh;
        padding: env(safe-area-inset-top) 15px calc(120px + env(safe-area-inset-bottom)) 15px;
        transition: background 0.4s ease, color 0.4s ease;
    }

    header { text-align: center; padding-top: 10px; animation: fadeInDown 0.5s ease; }
    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        color: var(--primary);
        margin: 0 0 4px 0;
        text-shadow: 0 0 14px var(--primary-glow);
        font-size: 26px;
        letter-spacing: 0.5px;
        font-weight: 800;
    }
    h1::before { content: var(--emoji); margin-right: 6px; }

    .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 12px; letter-spacing: 0.5px; }

    .theme-switcher {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 14px;
        flex-wrap: wrap;
        max-width: 100%;
        padding: 0 5px;
    }
    .theme-btn {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.25s ease;
        padding: 0;
        flex-shrink: 0;
    }
    .theme-btn.active { border-color: var(--text); transform: scale(1.15); box-shadow: 0 0 10px var(--primary-glow); }
    .theme-dragon { background: linear-gradient(135deg, #ffcc00, #ff8800); }
    .theme-inferno { background: linear-gradient(135deg, #ff5522, #aa0000); }
    .theme-matrix { background: linear-gradient(135deg, #00ff44, #006622); }
    .theme-cyberpunk { background: linear-gradient(135deg, #ff00aa, #6600ff); }
    .theme-ocean { background: linear-gradient(135deg, #00aaff, #003366); }
    .theme-retro { background: linear-gradient(135deg, #ff6ec7, #ffb86c); }
    .theme-sakura { background: linear-gradient(135deg, #ff80b0, #ffccdd); }
    .theme-ice { background: linear-gradient(135deg, #88ddff, #5588bb); }
    .theme-demon { background: linear-gradient(135deg, #bb44ff, #441166); }
    .theme-dark { background: linear-gradient(135deg, #444444, #000000); }

    .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        padding: 4px 12px;
        border-radius: 20px;
        background: rgba(0, 255, 136, 0.1);
        color: var(--success);
        margin-bottom: 10px;
        transition: all 0.3s;
        font-weight: 600;
        letter-spacing: 0.3px;
    }
    .status.offline { background: rgba(255, 68, 102, 0.1); color: var(--danger); }
    .status .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: currentColor;
        animation: blink 1.8s infinite;
        box-shadow: 0 0 8px currentColor;
    }
    @keyframes blink { 50% { opacity: 0.3; } }

    .clock {
        text-align: center;
        color: var(--success);
        font-size: 17px;
        margin-bottom: 14px;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        text-shadow: 0 0 10px currentColor;
        letter-spacing: 1px;
    }

    .notif-panel {
        background: var(--card);
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 12px;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .notif-panel .label {
        font-size: 13px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 500;
    }
    .notif-panel select {
        background: var(--input);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
        font-family: inherit;
        font-weight: 600;
    }
    .notif-panel select:focus { outline: none; border-color: var(--border-focus); }

    .install-hint {
        background: var(--card);
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        margin-bottom: 12px;
        font-size: 11px;
        color: var(--text-dim);
        text-align: center;
        line-height: 1.5;
    }
    .install-hint strong { color: var(--primary); }
    .install-hint .close-hint {
        color: var(--text-dim);
        font-size: 14px;
        float: right;
        cursor: pointer;
        opacity: 0.6;
        padding: 0 4px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.5s ease;
    }
    th, td {
        padding: 11px 4px;
        text-align: center;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
    }
    tr { transition: background 0.2s; }
    tr:last-child td { border-bottom: none; }
    th {
        background: var(--header);
        color: var(--primary);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        padding: 12px 4px;
        font-weight: 700;
    }

    input[type="text"], input[type="time"] {
        background: var(--input);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 9px 4px;
        width: 100%;
        text-align: center;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        -webkit-appearance: none;
        appearance: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
        outline: none;
        border-color: var(--border-focus);
        box-shadow: 0 0 0 2px var(--primary-glow);
    }

    .next {
        font-weight: bold;
        font-size: 16px;
        font-variant-numeric: tabular-nums;
        line-height: 1.2;
        color: var(--success);
        transition: color 0.3s;
    }
    .next.pasado { color: var(--danger); text-decoration: line-through; opacity: 0.55; }
    .next.proximo { color: var(--warning); animation: pulse 1.3s infinite; }
    .next.empty { color: var(--text-dim); font-size: 18px; font-weight: normal; }
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.04); }
    }
    .countdown {
        display: block;
        font-size: 10px;
        color: var(--text-dim);
        font-weight: normal;
        margin-top: 2px;
        letter-spacing: 0.3px;
    }

    .bell {
        background: none;
        border: none;
        font-size: 18px;
        padding: 6px;
        line-height: 1;
        cursor: pointer;
        opacity: 0.3;
        transition: all 0.25s;
        filter: grayscale(1);
    }
    .bell.on { opacity: 1; filter: grayscale(0); animation: bellRing 0.6s ease; }
    @keyframes bellRing {
        0% { transform: rotate(0); }
        25% { transform: rotate(-15deg); }
        50% { transform: rotate(15deg); }
        75% { transform: rotate(-10deg); }
        100% { transform: rotate(0); }
    }

    .btn-del {
        background: none;
        border: none;
        color: var(--danger);
        font-size: 22px;
        padding: 4px;
        line-height: 1;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .btn-del:active { transform: scale(0.85); }

    .controls {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: color-mix(in srgb, var(--bg-1) 88%, transparent);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 12px 15px calc(12px + env(safe-area-inset-bottom)) 15px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    button.action {
        background: var(--primary);
        color: #000;
        padding: 13px 18px;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        flex: 1;
        max-width: 220px;
        font-family: inherit;
        transition: transform 0.15s, box-shadow 0.2s;
        box-shadow: 0 4px 14px var(--primary-glow);
    }
    button.action:active { transform: scale(0.96); }
    button.action.secondary {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--primary);
        box-shadow: none;
    }

    .toast {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 10px);
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: var(--header);
        color: var(--primary);
        padding: 10px 18px;
        border-radius: 25px;
        font-size: 13px;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 100;
        box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        border: 1px solid var(--border);
        font-weight: 600;
        max-width: 90%;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .alert-banner {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 50px);
        left: 50%;
        transform: translateX(-50%) translateY(-200px);
        background: var(--warning);
        color: #000;
        padding: 14px 22px;
        border-radius: 14px;
        font-weight: 800;
        font-size: 15px;
        z-index: 200;
        box-shadow: 0 8px 30px var(--primary-glow);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        text-align: center;
        min-width: 250px;
    }
    .alert-banner.show { transform: translateX(-50%) translateY(0); animation: shakeIt 0.5s ease; }
    @keyframes shakeIt {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        25% { transform: translateX(-52%) translateY(0); }
        75% { transform: translateX(-48%) translateY(0); }
    }
</style>

    const esIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const esStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const soportaNotif = "Notification" in window;

    function hayInputEnfocado() {
        const a = document.activeElement;
        return a && (a.tagName === "INPUT" || a.tagName === "SELECT");
    }

    function aplicarTema(t) {
        if (t === "dragon") document.documentElement.removeAttribute("data-theme");
        else document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("phantomTheme", t);
        document.querySelectorAll(".theme-btn").forEach(b => {
            b.classList.toggle("active", b.dataset.t === t);
        });
        const colors = {
            dragon: "#0a0a1f", inferno: "#1a0505", matrix: "#000505", cyberpunk: "#0a0518",
            ocean: "#001428", retro: "#1a0a2e", sakura: "#2e1a24", ice: "#0a1a2e",
            demon: "#150018", dark: "#050505"
        };
        document.querySelector("meta[name=theme-color]").setAttribute("content", colors[t] || "#0a0a1f");
    }
    document.querySelectorAll(".theme-btn").forEach(b => {
        b.addEventListener("click", () => aplicarTema(b.dataset.t));
    });
    aplicarTema(localStorage.getItem("phantomTheme") || "dragon");

    function getAvisosLocal() {
        try { return JSON.parse(localStorage.getItem("phantomAvisos") || "{}"); }
        catch(e) { return {}; }
    }
    function setAvisoLocal(id, on) {
        const a = getAvisosLocal();
        if (on) a[id] = true; else delete a[id];
        localStorage.setItem("phantomAvisos", JSON.stringify(a));
    }
    function getMinutosAviso() {
        return parseInt(localStorage.getItem("phantomMinutos") || "5", 10);
    }
    const selMin = document.getElementById("minutosAviso");
    selMin.value = getMinutosAviso();
    selMin.addEventListener("change", () => {
        localStorage.setItem("phantomMinutos", selMin.value);
        mostrarToast("Aviso: " + selMin.value + " min antes");
    });

    async function pedirPermiso() {
        if (!soportaNotif) return false;
        if (Notification.permission === "granted") return true;
        if (Notification.permission === "denied") return false;
        try {
            const r = await Notification.requestPermission();
            return r === "granted";
        } catch(e) { return false; }
    }

    function actualizarHintInstalacion() {
        const hint = document.getElementById("installHint");
        if (localStorage.getItem("phantomHintCerrado") === "1") { hint.style.display = "none"; return; }
        const hayAvisos = Object.keys(getAvisosLocal()).length > 0;
        if (esIOS && !esStandalone && hayAvisos) hint.style.display = "block";
        else hint.style.display = "none";
    }
    window.cerrarHint = function() {
        localStorage.setItem("phantomHintCerrado", "1");
        document.getElementById("installHint").style.display = "none";
    };
    actualizarHintInstalacion();

    let audioCtx = null;

        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === "suspended") audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duracion / 1000);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duracion / 1000);
            setTimeout(() => {
                if (!audioCtx) return;
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = "sine";
                osc2.frequency.value = freq * 1.5;
                gain2.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duracion / 1000);
                osc2.connect(gain2).connect(audioCtx.destination);
                osc2.start();
                osc2.stop(audioCtx.currentTime + duracion / 1000);
            }, duracion + 80);
        } catch(e) {}
    }

    function vibrar(patron) { if (navigator.vibrate) navigator.vibrate(patron); }

    function lanzarAvisoSistema(titulo, cuerpo) {
        if (soportaNotif && Notification.permission === "granted") {
            try { new Notification(titulo, { body: cuerpo, tag: "phantom-" + Date.now() }); } catch(e) {}
        }
    }

    function avisar(canal, tipo) {
        const titulo = tipo === "preview"
            ? "⚠️ Phantom en " + canal + " sale pronto"
            : "🐉 ¡PHANTOM YA EN " + canal.toUpperCase() + "!";
        const cuerpo = tipo === "preview" ? "Quedan " + getMinutosAviso() + " minutos" : "¡A por él!";
        beep(tipo === "now" ? 800 : 500, tipo === "now" ? 1046 : 880);
        vibrar(tipo === "now" ? [300, 100, 300, 100, 300, 100, 500] : [200, 100, 200, 100, 400]);
        lanzarAvisoSistema(titulo, cuerpo);
        mostrarAlertBanner(titulo);
    }

    const estadoEl = document.getElementById("estado");
    const estadoTxt = document.getElementById("estadoTxt");
    const connRef = ref(db, ".info/connected");
    onValue(connRef, (snap) => {
        if (snap.val() === true) {
            estadoEl.classList.remove("offline");
            estadoTxt.textContent = "Sincronizado";
        } else {
            estadoEl.classList.add("offline");
            estadoTxt.textContent = "Sin conexión";
        }
    });

    onValue(canalesRef, (snapshot) => {
        const valor = snapshot.val();
        datos = valor || {};

        if (!yaInicializado && Object.keys(datos).length === 0) {
            yaInicializado = true;
            const inicial = {};
            const base = Date.now();
            ["Canal 1", "Canal 2", "Canal 3"].forEach((nombre, i) => {
                const k = push(canalesRef).key;
                inicial[k] = { canal: nombre, muerte: "", orden: base + i };
            });
            set(canalesRef, inicial);
            return;
        }
        yaInicializado = true;

        // BUG FIX: si hay un input enfocado (selector de hora abierto en iOS, etc.),
        // no re-renderizamos para no cerrarlo. Marcamos pendiente.
        if (hayInputEnfocado()) {
            renderPendiente = true;
            actualizarDatosSinRender();
        } else {
            render();
        }
    });

    // Actualiza solo los valores visibles sin reconstruir el DOM
    function actualizarDatosSinRender() {
        const entradas = Object.entries(datos);
        entradas.forEach(([id, c]) => {
            const tr = document.querySelector('tr[data-id="' + id + '"]');
            if (!tr) return;
            const inCanal = tr.querySelector('input[data-field="canal"]');
            const inMuerte = tr.querySelector('input[data-field="muerte"]');
            const tdSalida = tr.cells[2];
            if (inCanal && document.activeElement !== inCanal && inCanal.value !== (c.canal || "")) {
                inCanal.value = c.canal || "";
            }
            if (inMuerte && document.activeElement !== inMuerte && inMuerte.value !== (c.muerte || "")) {
                inMuerte.value = c.muerte || "";
                tdSalida.dataset.muerte = c.muerte || "";
            }
        });
    }

    function render() {
        const cuerpo = document.getElementById("cuerpo");
        cuerpo.innerHTML = "";
        const entradas = Object.entries(datos).sort((a, b) => (a[1].orden || 0) - (b[1].orden || 0));
        const avisos = getAvisosLocal();

        entradas.forEach(([id, c]) => {
            const tr = document.createElement("tr");
            tr.dataset.id = id;

            const tdCanal = document.createElement("td");
            const inCanal = document.createElement("input");
            inCanal.type = "text";
            inCanal.value = c.canal || "";
            inCanal.dataset.id = id;
            inCanal.dataset.field = "canal";
            inCanal.oninput = (e) => actualizar(id, "canal", e.target.value);
            tdCanal.appendChild(inCanal);

            const tdMuerte = document.createElement("td");
            const inMuerte = document.createElement("input");
            inMuerte.type = "time";
            inMuerte.value = c.muerte || "";
            inMuerte.dataset.id = id;
            inMuerte.dataset.field = "muerte";
            inMuerte.onchange = (e) => actualizar(id, "muerte", e.target.value);
            // Cuando el input pierde foco, si hay render pendiente, ejecutarlo
            inMuerte.onblur = () => {
                if (renderPendiente) {
                    renderPendiente = false;
                    setTimeout(() => { if (!hayInputEnfocado()) render(); }, 100);
                }
            };
            inCanal.onblur = inMuerte.onblur;
            tdMuerte.appendChild(inMuerte);

            const tdSalida = document.createElement("td");
            tdSalida.className = "next";
            tdSalida.dataset.muerte = c.muerte || "";
            tdSalida.dataset.canalId = id;
            actualizarSalidaCelda(tdSalida);

            const tdBell = document.createElement("td");
            const btnBell = document.createElement("button");
            btnBell.className = "bell" + (avisos[id] ? " on" : "");
            btnBell.textContent = avisos[id] ? "🔔" : "🔕";
            btnBell.onclick = async () => {
                const yaOn = !!avisos[id];
                if (!yaOn && soportaNotif) await pedirPermiso();
                setAvisoLocal(id, !yaOn);
                if (!yaOn) {
                    beep(100, 1200);
                    mostrarToast("Aviso activado: " + (c.canal || "Canal"));
                } else {
                    mostrarToast("Aviso desactivado");
                }
                // Actualizar solo el botón, sin re-render completo
                btnBell.className = "bell" + (!yaOn ? " on" : "");
                btnBell.textContent = !yaOn ? "🔔" : "🔕";
                actualizarHintInstalacion();
            };
            tdBell.appendChild(btnBell);

            const tdDel = document.createElement("td");
            const btn = document.createElement("button");
            btn.className = "btn-del";
            btn.textContent = "×";
            btn.onclick = () => eliminar(id);
            tdDel.appendChild(btn);

            tr.append(tdCanal, tdMuerte, tdSalida, tdBell, tdDel);
            cuerpo.appendChild(tr);
        });
    }

    function calcularSalida(muerte) {
        if (!muerte) return null;
        const [h, m] = muerte.split(":").map(Number);
        const ahora = new Date();
        const muerteDate = new Date();
        muerteDate.setHours(h, m, 0, 0);
        if (muerteDate > ahora) muerteDate.setDate(muerteDate.getDate() - 1);
        return new Date(muerteDate.getTime() + 6 * 60 * 60 * 1000);
    }

    function actualizarSalidaCelda(td) {
        const muerte = td.dataset.muerte;
        if (!muerte) {
            td.classList.add("empty");
            td.classList.remove("pasado", "proximo");
            td.textContent = "—";
            return;
        }
        td.classList.remove("empty");
        const salida = calcularSalida(muerte);
        const ahora = new Date();
        const diffMs = salida - ahora;
        const sH = salida.getHours().toString().padStart(2, "0");
        const sM = salida.getMinutes().toString().padStart(2, "0");

        td.innerHTML = sH + ":" + sM + '<span class="countdown"></span>';
        const cd = td.querySelector(".countdown");

        td.classList.remove("pasado", "proximo");
        if (diffMs < 0) {
            td.classList.add("pasado");
            const minPasados = Math.floor(-diffMs / 60000);
            cd.textContent = minPasados < 60
                ? "hace " + minPasados + "m"
                : "hace " + Math.floor(minPasados / 60) + "h " + (minPasados % 60) + "m";
        } else {
            if (diffMs < 10 * 60000) td.classList.add("proximo");
            const totalSec = Math.floor(diffMs / 1000);
            const hh = Math.floor(totalSec / 3600);
            const mm = Math.floor((totalSec % 3600) / 60);
            const ss = totalSec % 60;
            cd.textContent = hh > 0
                ? "en " + hh + "h " + mm + "m"
                : (mm > 0 ? "en " + mm + "m " + ss + "s" : "en " + ss + "s");
        }
    }

    function actualizar(id, campo, valor) {
        const updates = {};
        updates["canales/" + id + "/" + campo] = valor;
        update(ref(db), updates);
        if (campo === "muerte") {
            delete avisosLanzados[id + "_preview"];
            delete avisosLanzados[id + "_now"];
            const tr = document.querySelector('tr[data-id="' + id + '"]');
            if (tr) {
                const td = tr.cells[2];
                td.dataset.muerte = valor;
                actualizarSalidaCelda(td);
            }
        }
    }

    window.agregarFila = function() {
        const num = Object.keys(datos).length + 1;
        const nuevoRef = push(canalesRef);
        set(nuevoRef, { canal: "Canal " + num, muerte: "", orden: Date.now() });
        mostrarToast("Canal añadido");
    };

    window.eliminar = function(id) {
        if (confirm("¿Eliminar este canal?")) {
            remove(ref(db, "canales/" + id));
            setAvisoLocal(id, false);
            mostrarToast("Canal eliminado");
        }
    };

    window.limpiarTodo = function() {
        if (confirm("¿Borrar TODOS los canales? Esto afecta a todo el grupo.")) {
            remove(canalesRef);
            localStorage.removeItem("phantomAvisos");
            avisosLanzados = {};
            mostrarToast("Todo limpio");
        }
    };

    function mostrarToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._h);
        t._h = setTimeout(() => t.classList.remove("show"), 2200);
    }

    function mostrarAlertBanner(msg) {
        const b = document.getElementById("alertBanner");
        b.textContent = msg;
        b.classList.add("show");
        clearTimeout(b._h);
        b._h = setTimeout(() => b.classList.remove("show"), 5000);
    }

    function tick() {
        const n = new Date();
        document.getElementById("reloj").textContent =
            n.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

        // Solo actualizar las celdas de salida, NO el DOM completo
        // Esto NO interfiere con inputs abiertos
        document.querySelectorAll(".next").forEach(actualizarSalidaCelda);

        const avisos = getAvisosLocal();
        const minPrev = getMinutosAviso();
        Object.entries(datos).forEach(([id, c]) => {
            if (!avisos[id] || !c.muerte) return;
            const salida = calcularSalida(c.muerte);
            if (!salida) return;
            const diffMs = salida - n;
            const diffMin = diffMs / 60000;

            if (diffMin > 0 && diffMin <= minPrev && !avisosLanzados[id + "_preview"]) {
                avisosLanzados[id + "_preview"] = true;
                avisar(c.canal || "Canal", "preview");
            }
            if (diffMin <= 0 && diffMin > -1 && !avisosLanzados[id + "_now"]) {
                avisosLanzados[id + "_now"] = true;
                avisar(c.canal || "Canal", "now");
            }
        });
    }
    setInterval(tick, 1000);
    tick();
</script>
