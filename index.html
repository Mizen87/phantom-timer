            inMuerte.dataset.id = id;
            inMuerte.dataset.field = "muerte";
            inMuerte.onchange = (e) => actualizar(id, "muerte", e.target.value);
            tdMuerte.appendChild(inMuerte);

            const tdSalida = document.createElement("td");
            tdSalida.className = "next";
            tdSalida.dataset.muerte = c.muerte || "";
            tdSalida.dataset.canalId = id;
            actualizarSalidaCelda(tdSalida);

            const tdBell = document.createElement("td");
            const btnBell = document.createElement("button");
            btnBell.className = "bell" + (avisos[id] ? " on" : "");
            btnBell.textContent = avisos[id] ? "🔔" : "🔕";
            btnBell.title = "Activar/desactivar aviso";
            btnBell.onclick = async () => {
                const yaOn = !!avisos[id];
                if (!yaOn) {
                    const ok = await pedirPermiso();
                    if (!ok && "Notification" in window) {
                        mostrarToast("Permiso de notificación denegado");
                    }
                }
                setAvisoLocal(id, !yaOn);
                if (!yaOn) {
                    // Reactivar audio context con la interacción
                    beep(100, 1200);
                    mostrarToast(`Aviso activado para ${c.canal || "este canal"}`);
                } else {
                    mostrarToast(`Aviso desactivado`);
                }
                render();
                actualizarAvisoPermiso();
            };
            tdBell.appendChild(btnBell);

            const tdDel = document.createElement("td");
            const btn = document.createElement("button");
            btn.className = "btn-del";
            btn.textContent = "×";
            btn.onclick = () => eliminar(id);
            tdDel.appendChild(btn);

            tr.append(tdCanal, tdMuerte, tdSalida, tdBell, tdDel);
            cuerpo.appendChild(tr);
        });

        if (focadoId && focadoField) {
            const restaurar = cuerpo.querySelector(`input[data-id="${focadoId}"][data-field="${focadoField}"]`);
            if (restaurar) {
                restaurar.focus();
                try { if (focadoSel !== null) restaurar.setSelectionRange(focadoSel, focadoSel); } catch(e) {}
            }
        }
    }

    function calcularSalida(muerte) {
        if (!muerte) return null;
        const [h, m] = muerte.split(":").map(Number);
        const ahora = new Date();
        const muerteDate = new Date();
        muerteDate.setHours(h, m, 0, 0);
        if (muerteDate > ahora) muerteDate.setDate(muerteDate.getDate() - 1);
        return new Date(muerteDate.getTime() + 6 * 60 * 60 * 1000);
    }

    function actualizarSalidaCelda(td) {
        const muerte = td.dataset.muerte;
        if (!muerte) {
            td.classList.add("empty");
            td.classList.remove("pasado", "proximo");
            td.textContent = "—";
            return;
        }
        td.classList.remove("empty");
        const salida = calcularSalida(muerte);
        const ahora = new Date();
        const diffMs = salida - ahora;
        const sH = salida.getHours().toString().padStart(2, "0");
        const sM = salida.getMinutes().toString().padStart(2, "0");

        td.innerHTML = `${sH}:${sM}<span class="countdown"></span>`;
        const cd = td.querySelector(".countdown");

        td.classList.remove("pasado", "proximo");
        if (diffMs < 0) {
            td.classList.add("pasado");
            const minPasados = Math.floor(-diffMs / 60000);
            cd.textContent = minPasados < 60
                ? `hace ${minPasados}m`
                : `hace ${Math.floor(minPasados / 60)}h ${minPasados % 60}m`;
        } else {
            if (diffMs < 10 * 60000) td.classList.add("proximo");
            const totalSec = Math.floor(diffMs / 1000);
            const hh = Math.floor(totalSec / 3600);
            const mm = Math.floor((totalSec % 3600) / 60);
            const ss = totalSec % 60;
            cd.textContent = hh > 0
                ? `en ${hh}h ${mm}m`
                : (mm > 0 ? `en ${mm}m ${ss}s` : `en ${ss}s`);
        }
    }

    function actualizar(id, campo, valor) {
        const updates = {};
        updates[`canales/${id}/${campo}`] = valor;
        update(ref(db), updates);

        if (campo === "muerte") {
            // Resetear los avisos lanzados de este canal si cambia la muerte
            delete avisosLanzados[id + "_preview"];
            delete avisosLanzados[id + "_now"];
            const tr = document.querySelector(`tr[data-id="${id}"]`);
            if (tr) {
                const td = tr.cells[2];
                td.dataset.muerte = valor;
                actualizarSalidaCelda(td);
            }
        }
    }

    window.agregarFila = function() {
        const num = Object.keys(datos).length + 1;
        const nuevoRef = push(canalesRef);
        set(nuevoRef, {
            canal: `Canal ${num}`,
            muerte: "",
            orden: Date.now()
        });
        mostrarToast("Canal añadido");
    };

    window.eliminar = function(id) {
        if (confirm("¿Eliminar este canal?")) {
            remove(ref(db, `canales/${id}`));
            setAvisoLocal(id, false);
            mostrarToast("Canal eliminado");
        }
    };

    window.limpiarTodo = function() {
        if (confirm("¿Borrar TODOS los canales? Esto afecta a todo el grupo.")) {
            remove(canalesRef);
            localStorage.removeItem("phantomAvisos");
            avisosLanzados = {};
            mostrarToast("Todo limpio");
        }
    };

    function mostrarToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._h);
        t._h = setTimeout(() => t.classList.remove("show"), 2200);
    }

    function mostrarAlertBanner(msg) {
        const b = document.getElementById("alertBanner");
        b.textContent = msg;
        b.classList.add("show");
        clearTimeout(b._h);
        b._h = setTimeout(() => b.classList.remove("show"), 5000);
    }

    // ========== TICK: actualizar y comprobar avisos ==========
    function tick() {
        const n = new Date();
        document.getElementById("reloj").textContent =
            n.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        document.querySelectorAll(".next").forEach(actualizarSalidaCelda);

        // Comprobar avisos
        const avisos = getAvisosLocal();
        const minPrev = getMinutosAviso();
        Object.entries(datos).forEach(([id, c]) => {
            if (!avisos[id] || !c.muerte) return;
            const salida = calcularSalida(c.muerte);
            if (!salida) return;
            const diffMs = salida - n;
            const diffMin = diffMs / 60000;

            // Aviso "preview" X minutos antes
            if (diffMin > 0 && diffMin <= minPrev && !avisosLanzados[id + "_preview"]) {
                avisosLanzados[id + "_preview"] = true;
                avisar(c.canal || "Canal", "preview");
            }
            // Aviso "now" cuando sale
            if (diffMin <= 0 && diffMin > -1 && !avisosLanzados[id + "_now"]) {
                avisosLanzados[id + "_now"] = true;
                avisar(c.canal || "Canal", "now");
            }
        });
    }
    setInterval(tick, 1000);
    tick();
</script>
